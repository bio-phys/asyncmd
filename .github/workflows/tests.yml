name: Tests
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["v*"]
  schedule:
    # run test automatically every Monday at 3
    - cron: "0 3 * * 1"

defaults:
  run:
    shell: bash -el {0}

jobs:
  tests:
    name: Tests (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", # "macos-latest", "windows-latest"
             ]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false
      - name: Cache conda
        uses: actions/cache@v5
        env:
          # Increase this value to reset cache if setup.py has not changed
          CACHE_NUMBER: 0
        with:
          path: ~/conda_pkgs_dir
          key:
            ${{ runner.os }}-python-${{ matrix.python-version }}-conda-${{ env.CACHE_NUMBER }}-${{
            hashFiles('setup.py') }}
      - uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          miniforge-version: latest
          conda-remove-defaults: true
          use-only-tar-bz2: true # IMPORTANT: This needs to be set for caching to work properly!
      - name: Install
        run: |
          conda install "gromacs<2026"
          python -m pip install -e .\[tests-all\]
      - name: List versions
        run: |
          conda list
          python -c "import asyncmd; print('asyncmd version is: ', asyncmd.__version__)"
      - name: Unit tests
        env:
          PY_COLORS: "1"
        run: pytest -vv --runall --cov=asyncmd --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
